---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: phoenix-mesh-controller
  namespace: mesh-system
  labels:
    app.kubernetes.io/part-of: phoenix-mesh

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: phoenix-mesh-controller
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["patch", "update"]

  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/rollback", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]

  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: phoenix-mesh-controller-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: phoenix-mesh-controller
subjects:
  - kind: ServiceAccount
    name: phoenix-mesh-controller
    namespace: mesh-system
